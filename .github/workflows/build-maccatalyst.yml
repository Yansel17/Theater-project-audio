name: Build Mac Catalyst

# Se dispara manualmente (Actions > Run workflow) o en cada push a main.
# Ajusta el trigger si prefieres que solo corra manualmente.
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-maccatalyst:
    runs-on: macos-26   # runner más nuevo disponible, con Xcode 26.x preinstalado

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Listar versiones de Xcode disponibles en el runner
        run: ls /Applications | grep Xcode

      - name: Seleccionar Xcode 26.5 (versión exacta requerida por el SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.5'

      - name: Ver versión de Xcode disponible
        run: xcodebuild -version

      - name: Instalar workloads MAUI (android, ios, maccatalyst)
        run: dotnet workload install maui-android maui-ios maui-maccatalyst

      - name: Restaurar dependencias
        run: dotnet restore TheaterCue/TheaterCue.UI.csproj

      - name: Compilar (net10.0-maccatalyst)
        run: >
          dotnet build TheaterCue/TheaterCue.UI.csproj
          -f net10.0-maccatalyst
          -c Release
          -p:CreatePackage=false

      - name: Subir el build como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TheaterCue-maccatalyst-build
          path: TheaterCue/TheaterCue/bin/Release/net10.0-maccatalyst/**
          if-no-files-found: warn
